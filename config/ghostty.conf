# ─────────────────────────────────────────────
# Ghostty Config — Opinionated Developer Setup
# Pairs with the claude-desktop-dark theme
# ─────────────────────────────────────────────

# Theme
theme = claude-desktop-dark

# Cursor — fat visible block, no blink
cursor-style = block
cursor-style-blink = false
adjust-cursor-thickness = 2

# Font — readable, slightly bold
font-size = 15
font-thicken = true
adjust-cell-height = 3

# Padding — breathing room around text
window-padding-x = 12
window-padding-y = 12
window-padding-balance = true

# Contrast — kills unreadable washed-out colors
minimum-contrast = 3

# Mouse
mouse-hide-while-typing = true

# macOS
macos-titlebar-style = tabs
macos-option-as-alt = left

# Window
window-save-state = always
window-colorspace = display-p3
background-opacity = 0.97
background-blur = 10

# Shell integration
shell-integration = detect
shell-integration-features = no-cursor,sudo,title

# Clipboard
clipboard-read = allow
clipboard-write = allow
